<script>
    // Chapter 57: Management of Patients with Burn Injury – exact 39 questions from document
    const questions = [
        {
            id: 1,
            question: "1. A client is brought to the emergency department from the site of a chemical fire, where the client suffered a burn that involves the epidermis, dermis, and the muscle and bone of the right arm. On inspection, the skin appears charred. Based on these assessment findings, what is the depth of the burn on the client's arm?",
            options: [
                "A. Superficial partial thickness",
                "B. Deep partial thickness",
                "C. Full partial thickness",
                "D. Full thickness"
            ],
            correct: 3, // D
            rationale: "A full-thickness burn involves total destruction of the epidermis and dermis and, in some cases, underlying tissue as well. Wound color ranges widely from white to red, brown, or black. The burned area is painless because the nerve fibers are destroyed. The wound can appear leathery; hair follicles and sweat glands are destroyed. Edema may also be present. Superficial partial-thickness burns involve the epidermis and possibly a portion of the dermis; the client will experience pain that is soothed by cooling. Deep partial-thickness burns involve the epidermis, upper dermis, and portion of the deeper dermis; the client will report pain and sensitivity to cold air. Full partial thickness is not a depth of burn. (PTS:1 REF:p.1867)"
        },
        {
            id: 2,
            question: "2. The current phase of a client's treatment for a burn injury prioritizes wound care, nutritional support, and prevention of complications such as infection. Based on these care priorities, the client is in what phase of burn care?",
            options: [
                "A. Emergent",
                "B. Immediate resuscitative",
                "C. Acute",
                "D. Rehabilitation"
            ],
            correct: 2, // C
            rationale: "The acute or intermediate phase of burn care follows the emergent/resuscitative phase and begins 48 to 72 hours after the burn injury. During this phase, attention is directed toward continued assessment and maintenance of respiratory and circulatory status, fluid and electrolyte balance, and gastrointestinal function. Infection prevention, burn wound care (i.e., wound cleaning, topical antibacterial therapy, wound dressing, dressing changes, wound débridement, and wound grafting), pain management, and nutritional support are priorities at this stage. Priorities during the emergent or immediate resuscitative phase include first aid, prevention of shock and respiratory distress, detection and treatment of concomitant injuries, and initial wound assessment and care. The priorities during the rehabilitation phase include prevention of scars and contractures, rehabilitation, functional and cosmetic reconstruction, and psychosocial counseling. (PTS:1 REF:p.1873)"
        },
        {
            id: 3,
            question: "3. A client in the emergent/resuscitative phase of a burn injury has had blood work and arterial blood gases drawn. Upon analysis of the client's laboratory studies, the nurse will expect the results to indicate what findings?",
            options: [
                "A. Hyperkalemia, hyponatremia, elevated hematocrit",
                "B. Hypokalemia, hypernatremia, decreased hematocrit",
                "C. Hyperkalemia, hypernatremia, decreased hematocrit",
                "D. Hypokalemia, hyponatremia, elevated hematocrit"
            ],
            correct: 0, // A
            rationale: "Fluid and electrolyte changes in the emergent/resuscitative phase of a burn injury include hyperkalemia related to the release of potassium into the extracellular fluid, hyponatremia from large amounts of sodium lost in trapped edema fluid, and hemoconcentration that leads to an increased hematocrit. (PTS:1 REF:p.1871)"
        },
        {
            id: 4,
            question: "4. A client has experienced an electrical burn and has developed thick eschar over the burn site. Which of the following topical antibacterial agents will the nurse expect the health care provider to order for the wound?",
            options: [
                "A. Silver sulfadiazine 1% (Silvadene) water-soluble cream",
                "B. Mafenide acetate 10% (Sulfamylon) hydrophilic-based cream",
                "C. Silver nitrate 0.5% aqueous solution",
                "D. Acticoat"
            ],
            correct: 1, // B
            rationale: "Mafenide acetate 10% hydrophilic-based cream is the agent of choice when there is a need to penetrate thick eschar. Silver products do not penetrate eschar; Acticoat is a type of silver dressing. (PTS:1 REF:p.1881)"
        },
        {
            id: 5,
            question: "5. An occupational health nurse is called to the floor of a factory where a worker has sustained a flash burn to the right arm. The nurse arrives and the flames have been extinguished. The next step is to 'cool the burn.' How should the nurse cool the burn?",
            options: [
                "A. Apply ice to the site of the burn for 5 to 10 minutes.",
                "B. Wrap the client's affected extremity in ice until help arrives.",
                "C. Apply an oil-based substance to the burned area until help arrives.",
                "D. Wrap cool towels around the affected extremity intermittently."
            ],
            correct: 3, // D
            rationale: "Once the burn has been sustained, the application of cool water is the best first-aid measure. Soaking the burn area intermittently in cool water or applying cool towels gives immediate and striking relief from pain, and limits local tissue edema and damage. However, never apply ice directly to the burn, never wrap the person in ice, and never use cold soaks or dressings for longer than several minutes; such procedures may worsen the tissue damage and lead to hypothermia in people with large burns. Oils are contraindicated. (PTS:1 REF:p.1874)"
        },
        {
            id: 6,
            question: "6. An emergency department nurse has just admitted a client with a burn. What characteristic of the burn will primarily determine whether the client experiences a systemic response to this injury?",
            options: [
                "A. The length of time since the burn",
                "B. The location of burned skin surfaces",
                "C. The source of the burn",
                "D. The total body surface area (TBSA) affected by the burn"
            ],
            correct: 3, // D
            rationale: "Systemic effects are a result of several variables. However, TBSA and wound severity are considered the major factors that affect the presence or absence of systemic effects. (PTS:1 REF:p.1868)"
        },
        {
            id: 7,
            question: "7. A nurse on a burn unit is caring for a client who experienced burn injuries 2 days ago. The client is now showing signs and symptoms of airway obstruction, despite appearing stable since admitted. How should the client's change in status be best understood?",
            options: [
                "A. The client is likely experiencing a delayed onset of respiratory complications",
                "B. The client has likely developed a systemic infection",
                "C. The client's respiratory complications are likely related to psychosocial stress",
                "D. The client is likely experiencing an anaphylactic reaction to a medication"
            ],
            correct: 0, // A
            rationale: "Airway obstruction caused by upper airway edema can take as long as 48 hours to develop. A systemic infection would be less likely to cause respiratory complications. This problem is more likely to be caused by physiologic factors at this phase, not psychological factors. Anaphylaxis must be ruled out, but it is less likely than a response to the initial injury. (PTS:1 REF:p.1876)"
        },
        {
            id: 8,
            question: "8. A client has been admitted to a burn intensive care unit with extensive full-thickness burns over 25% of the body. After ensuring cardiopulmonary stability, what would be the nurse's immediate, priority concern when planning this client's care?",
            options: [
                "A. Fluid status",
                "B. Risk of infection",
                "C. Nutritional status",
                "D. Psychosocial coping"
            ],
            correct: 0, // A
            rationale: "During the early phase of burn care, the nurse is most concerned with fluid resuscitation, to correct large-volume fluid loss through the damaged skin. Infection control and early nutritional support are important, but fluid resuscitation is an immediate priority. Coping is a higher priority later in the recovery period. (PTS:1 REF:p.1873)"
        },
        {
            id: 9,
            question: "9. The nurse is providing education to a client that is scheduled for mechanical débridement of a wound. The nurse knows that mechanical débridement involves which element?",
            options: [
                "A. A spontaneous separation of dead tissue from the viable tissue",
                "B. Removal of eschar until the point of pain and bleeding occurs",
                "C. Shaving of burned skin layers until bleeding, viable tissue is revealed",
                "D. Early closure of the wound"
            ],
            correct: 1, // B
            rationale: "Mechanical débridement can be achieved through the use of surgical scissors, scalpels, or forceps to remove the eschar until the point of pain and bleeding occurs. Mechanical débridement can also be accomplished through the use of topical enzymatic débridement agents. The spontaneous separation of dead tissue from the viable tissue is an example of natural débridement. Shaving the burned skin layers and early wound closure are examples of surgical débridement. (PTS:1 REF:p.1881)"
        },
        {
            id: 10,
            question: "10. A client with a partial-thickness burn injury had a xenograft applied 2 weeks ago. The nurse notices that the xenograft is separating from the burn wound. What is the nurse's most appropriate intervention?",
            options: [
                "A. Reinforce the xenograft dressing with another piece of Biobrane.",
                "B. Remove the xenograft dressing and apply a new dressing.",
                "C. Trim away the separated xenograft.",
                "D. Notify the health care provider for further emergency-related orders."
            ],
            correct: 2, // C
            rationale: "Xenografts adhere to granulation tissue. As the tissue heals the xenograft will become removed from the scar tissue. Applying more of the xenograft will not continue to heal the wound (as it is already healed). It is not an emergency and reinforcement is not necessary. (PTS:1 REF:p.1883)"
        },
        {
            id: 11,
            question: "11. An emergency department nurse learns from the paramedics that the team is transporting a client who has suffered injury from a scald from a hot kettle. What variables will the nurse consider when determining the depth of burn?",
            options: [
                "A. The causative agent",
                "B. The client's pre-injury health status",
                "C. The client's prognosis for recovery",
                "D. The circumstances of the accident"
            ],
            correct: 0, // A
            rationale: "The following factors are considered in determining the depth of a burn: how the injury occurred, causative agent (such as flame or scalding liquid), temperature of the burning agent, duration of contact with the agent, and thickness of the skin. The client's pre-injury status, circumstances of the accident, and prognosis for recovery are important, but are not considered when determining the depth of the burn. (PTS:1 REF:p.1868)"
        },
        {
            id: 12,
            question: "12. A nurse is caring for a client who has sustained a deep partial-thickness burn injury. In prioritizing the nursing diagnoses for the plan of care, the nurse will give the highest priority to what nursing diagnosis?",
            options: [
                "A. Activity intolerance",
                "B. Anxiety",
                "C. Ineffective coping",
                "D. Acute pain"
            ],
            correct: 3, // D
            rationale: "Pain is inevitable during recovery from any burn injury. Pain in the burn client has been described as one of the most severe types of acute pain. Management of the often-severe pain is one of the most difficult challenges facing the burn team. While the other nursing diagnoses listed are valid, the presence of pain may contribute to these diagnoses. Management of the client's pain is the priority, as it may have a direct correlation to the other listed nursing diagnoses. (PTS:1 REF:p.1884)"
        },
        {
            id: 13,
            question: "13. A triage nurse in the emergency department (ED) receives a phone call from a frantic parent who saw their 4-year-old child tip a pot of boiling water onto themselves. The parent has called an ambulance. What should the nurse in the ED receiving the call instruct the parent to do?",
            options: [
                "A. Cover the burn with ice and secure with a towel.",
                "B. Apply butter to the area that is burned.",
                "C. Immerse the child in a cool bath.",
                "D. Avoid touching the burned area under any circumstances."
            ],
            correct: 2, // C
            rationale: "After the flames or heat source have been removed or extinguished, the burned area and adherent clothing are soaked with cool water briefly to cool the wound and halt the burning process. Cool water is the best first-aid measure. Ice and butter are contraindicated. Appropriate first aid necessitates touching the burn. (PTS:1 REF:p.1874)"
        },
        {
            id: 14,
            question: "14. A nurse is teaching a client with a partial-thickness wound how to wear the elastic pressure garment. How often should the nurse instruct the client to wear this garment?",
            options: [
                "A. 4 to 6 hours a day for 6 months",
                "B. During waking hours for 2 to 3 months after the injury",
                "C. Continuously",
                "D. At night while sleeping for a year after the injury"
            ],
            correct: 2, // C
            rationale: "Elastic pressure garments are worn continuously (i.e., 24 hours a day). (PTS:1 REF:p.1889)"
        },
        {
            id: 15,
            question: "15. A client is brought to the ED by paramedics, who report that the client has partial-thickness burns on the chest and legs. The client has also suffered smoke inhalation. What is the priority in the care of a client who has been burned and suffered smoke inhalation?",
            options: [
                "A. Pain",
                "B. Fluid balance",
                "C. Anxiety and fear",
                "D. Airway management"
            ],
            correct: 3, // D
            rationale: "Systemic threats from a burn are the greatest threat to life. The ABCs of all trauma care apply during the early post-burn period. While all options should be addressed, pain, fluid balance, and anxiety and fear do not take precedence over airway management. (PTS:1 REF:p.1872)"
        },
        {
            id: 16,
            question: "16. A nurse is caring for a client in the emergent/resuscitative phase of burn injury. During this phase, the nurse should monitor for evidence of what alteration in laboratory values?",
            options: [
                "A. Sodium deficit",
                "B. Decreased prothrombin time (PT)",
                "C. Potassium deficit",
                "D. Decreased hematocrit"
            ],
            correct: 0, // A
            rationale: "Anticipated fluid and electrolyte changes that occur during the emergent/resuscitative phase of burn injury include sodium deficit, potassium excess, and elevated hematocrit. PT does not typically decrease. (PTS:1 REF:p.1851)"
        },
        {
            id: 17,
            question: "17. A nurse is developing a care plan for a client with a partial-thickness burn, and determines that an appropriate goal is to maintain position of joints in alignment. What is the best rationale for this intervention?",
            options: [
                "A. To prevent neuropathies",

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[q.id - 1];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[q.id - 1];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[q.id - 1] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[q.id - 1] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            const q = questions[currentQuestion];
            selectedOption = answers[q.id - 1];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
